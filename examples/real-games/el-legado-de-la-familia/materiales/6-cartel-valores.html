<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');
@page { size: A4 portrait; margin: 0; }
body { width: 186mm; height: 267mm; background: #1a1a1a; margin: 0; padding: 0; }
.cartel {
  width: 186mm; height: 267mm; display: flex; flex-direction: column;
  justify-content: center; align-items: center; color: #f5e6c8;
  font-family: 'EB Garamond', serif; padding: 20mm; box-sizing: border-box;
  text-align: center;
}
.cartel-text { font-size: 18pt; line-height: 2; }
.cartel-sub { font-size: 12pt; line-height: 1.8; margin-top: 8mm; color: #d4c5a9; }
</style>
</head>
<body>

<div class="cartel">
  <div class="cartel-text">
    Los valores se ganaron en orden:<br><br>
    Rama I — Lealtad<br>
    Rama II — Empatía<br>
    Rama III — Generosidad<br>
    Rama IV — Amor<br>
    Rama V — Dignidad<br>
    Rama VI — Orgullo
  </div>
  <div class="cartel-sub">
    Cada letra tiene su lugar. Buscad donde encaja.<br>
    UNA RAMA SOLA NO ABRE UNA RAÍZ.
  </div>
</div>

</body>
</html>
