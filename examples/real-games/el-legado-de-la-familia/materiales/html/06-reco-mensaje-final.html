<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');
@page { size: A4 portrait; margin: 0; }
body { width: 186mm; height: 267mm; background-color: #faf0e6; margin: 0; padding: 0; }
.carta-page {
  width: 186mm; min-height: 267mm;
  background-color: #faf0e6; padding: 20mm 25mm 20mm 28mm;
  font-family: 'EB Garamond', Georgia, serif; font-size: 12pt; line-height: 1.7;
  color: #4a3728; page-break-inside: auto; page-break-after: always;
  position: relative; box-sizing: border-box;
  display: flex; flex-direction: column; justify-content: center;
  text-align: center;
}
.carta-page::before {
  box-shadow: inset 0 0 40px 10px rgba(139,115,85,0.1);
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  content: ''; pointer-events: none;
}
</style>
</head>
<body>

<div class="carta-page">
  <p>No heredisteis objetos: heredisteis una verdad que os devuelve a quien siempre perteneció. Los hilos ya están cortados. Sois libres de escribir vuestra propia historia.</p>
</div>

</body>
</html>
