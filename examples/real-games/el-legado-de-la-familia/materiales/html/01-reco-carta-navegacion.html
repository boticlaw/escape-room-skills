<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@400;700&display=swap');

h1, h2, h3, h4, .title, .titulo, .header-text, .section-title, .cover-title, .cover-subtitle, .block-title, .cert-title, .page-title, .foto-title, .sol-code, .section-header, .char-gen-title, .puzzle-badge {
  font-family: 'Playfair Display', Georgia, serif;
}
@page { size: A4 portrait; margin: 0; }
body { width: 186mm; background-color: #faf0e6; margin: 0; padding: 0; }

.carta-page {
  width: 186mm; min-height: 267mm;
  background: linear-gradient(135deg, #faf5ee 0%, #f0e8d8 100%);
  padding: 20mm 22mm 20mm 28mm;
  font-family: 'EB Garamond', Georgia, serif; font-size: 10.5pt; line-height: 1.6;
  color: #4a3728; page-break-inside: auto; page-break-after: always;
  position: relative; box-sizing: border-box;
  display: flex; flex-direction: column; justify-content: center;
  box-shadow: inset 0 0 30px 8px rgba(139,115,85,0.08);
}

/* Aging inner shadow */
.carta-page::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  box-shadow: inset 0 0 50px 15px rgba(139,115,85,0.12);
  pointer-events: none;
  z-index: 2;
}

/* Coffee stain top-right */
.carta-page::after {
  content: '';
  position: absolute;
  top: 20mm; right: 15mm;
  width: 15mm; height: 12mm;
  background: radial-gradient(ellipse, rgba(139,90,43,0.08) 0%, rgba(139,90,43,0.03) 50%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
}

/* Wax seal with E initial */
.sello-cera {
  position: absolute;
  bottom: 18mm; right: 18mm;
  width: 18mm; height: 18mm;
  background: radial-gradient(circle at 35% 35%, #b22222 0%, #8b0000 40%, #5c0000 75%, #3a0000 100%);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(212,163,115,0.9); font-size: 11pt; font-weight: 700;
  font-family: 'Playfair Display', Georgia, serif;
  box-shadow: 1px 1px 3px rgba(0,0,0,0.3), inset 0 0 5px rgba(0,0,0,0.2);
  transform: rotate(-8deg);
  z-index: 3;
}

/* Navigation text with arrow */
.nav-text {
  position: relative; z-index: 3;
  font-size: 10.5pt; line-height: 1.7;
}
.nav-text::after {
  content: '→';
  display: block;
  text-align: right;
  font-size: 14pt;
  color: #8b7355;
  margin-top: 5mm;
  letter-spacing: 2mm;
}

p { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="carta-page">
  <div class="sello-cera">E</div>
  <p class="nav-text">No todas las presencias se ven en los rostros. A veces se esconden detrás de lo que alguien quiso borrar. Buscad el retrato que cuelga de la pared.</p>
</div>

</body>
</html>
