<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@400;700&display=swap');

h1, h2, h3, h4, .title, .titulo, .header-text, .section-title, .cover-title, .cover-subtitle, .block-title, .cert-title, .page-title, .foto-title, .sol-code, .section-header, .char-gen-title, .puzzle-badge {
  font-family: 'Playfair Display', Georgia, serif;
}
@page { size: A4 portrait; margin: 0; }
body { width: 186mm; background-color: #faf0e6; margin: 0; padding: 0; }

.carta-page {
  width: 186mm; min-height: 267mm;
  background: linear-gradient(135deg, #faf5ee 0%, #f0e8d8 100%);
  padding: 25mm 30mm 25mm 30mm;
  font-family: 'EB Garamond', Georgia, serif; font-size: 14pt; line-height: 1.8;
  color: #4a3728; page-break-inside: auto; page-break-after: always;
  position: relative; box-sizing: border-box;
  display: flex; flex-direction: column; justify-content: center;
  box-shadow: inset 0 0 35px 10px rgba(139,115,85,0.1);
}

/* Decorative border */
.borde-deco {
  position: absolute;
  top: 10mm; left: 10mm; right: 10mm; bottom: 10mm;
  border: 2px double #8b7355;
  pointer-events: none;
  z-index: 1;
}
.borde-deco::before {
  content: '';
  position: absolute;
  top: 3mm; left: 3mm; right: 3mm; bottom: 3mm;
  border: 1px solid rgba(139,115,85,0.3);
  pointer-events: none;
}
.borde-deco::after {
  content: '✦  ✦  ✦';
  position: absolute; top: -2.5mm; left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #faf5ee 0%, #f0e8d8 100%);
  padding: 0 4mm;
  color: #8b7355; font-size: 7pt; letter-spacing: 3mm;
}

/* Tape mark */
.cinta-adhesiva {
  position: absolute;
  top: -2mm; left: 35%;
  width: 35mm; height: 7mm;
  background: rgba(255,248,220,0.35);
  border: 0.5px solid rgba(200,190,160,0.3);
  transform: rotate(-2deg);
  pointer-events: none;
  z-index: 3;
}

.firma { text-align: right; margin-top: 10mm; font-style: italic; font-size: 13pt; }

p { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="carta-page">
  <div class="borde-deco"></div>
  <div class="cinta-adhesiva"></div>
  <p>Este retrato miente. Hubo uno más entre nosotros.</p>
  <p>Rodrigo lo borró con la misma mano con la que movía nuestros hilos. Yo guardé su recuerdo donde los ojos no llegan.</p>
  <p>Mirad detrás. Usad el papel verde.</p>
  <div class="firma">— E.</div>
</div>

</body>
</html>
