<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@400;700&display=swap');

h1, h2, h3, h4, .title, .titulo, .header-text, .section-title, .cover-title, .cover-subtitle, .block-title, .cert-title, .page-title, .foto-title, .sol-code, .section-header, .char-gen-title, .puzzle-badge {
  font-family: 'Playfair Display', Georgia, serif;
}
@page { size: A4 portrait; margin: 0; }
body { width: 186mm; background-color: #faf0e6; margin: 0; padding: 0; }

.carta-page {
  width: 186mm; min-height: 267mm;
  background: linear-gradient(135deg, #f5e6c8 0%, #efe0c0 40%, #e8d5a8 70%, #f0e0c0 100%);
  padding: 20mm 22mm 20mm 28mm;
  font-family: 'EB Garamond', Georgia, serif; font-size: 10.5pt; line-height: 1.6;
  color: #4a3728; page-break-inside: auto; page-break-after: always;
  position: relative; box-sizing: border-box;
  display: flex; flex-direction: column; justify-content: center;
  box-shadow: inset 0 0 50px 15px rgba(139,115,85,0.12);
}

/* Coffee stain — top right area */
.carta-page::after {
  content: '';
  position: absolute; top: 30mm; right: 22mm;
  width: 18mm; height: 14mm;
  background: radial-gradient(ellipse, rgba(139,90,43,0.08) 0%, rgba(139,90,43,0.04) 40%, transparent 65%);
  border-radius: 50%; pointer-events: none; z-index: 1;
}

/* Decorative mark — top right */
.marca-deco {
  position: absolute;
  top: 18mm; right: 18mm;
  width: 10mm; height: 10mm;
  border: 1px solid rgba(139,115,85,0.25);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(139,115,85,0.3);
  font-size: 7pt;
}

/* Navigation arrow — bottom left */
.flecha-navegacion {
  position: absolute;
  bottom: 22mm; left: 22mm;
  width: 12mm; height: 12mm;
  border: 1px solid rgba(139,115,85,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transform: rotate(-15deg);
  pointer-events: none; z-index: 1;
}
.flecha-navegacion::before {
  content: '▲';
  color: rgba(139,115,85,0.2);
  font-size: 7pt;
}
/* Cardinal lines */
.flecha-navegacion::after {
  content: '';
  position: absolute; top: -2mm; left: 50%; width: 0.5px; height: calc(100% + 4mm);
  background: rgba(139,115,85,0.12);
  transform: translateX(-50%);
}

/* Wax seal — bottom right */
.sello-cera {
  width: 18mm; height: 18mm;
  background: radial-gradient(circle at 35% 35%, #b22222 0%, #8b0000 40%, #5c0000 75%, #3a0000 100%);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(212,163,115,0.9);
  font-size: 10pt; font-weight: 700;
  font-family: 'Playfair Display', serif;
  box-shadow: 1px 1px 3px rgba(0,0,0,0.3), inset 0 0 5px rgba(0,0,0,0.2);
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
  transform: rotate(-8deg);
  position: absolute;
  bottom: 20mm; right: 22mm;
  z-index: 5;
}
.sello-cera::after {
  content: '';
  position: absolute; top: 2mm; left: 2mm; right: 2mm; bottom: 2mm;
  border: 0.5px solid rgba(212,163,115,0.3);
  border-radius: 50%;
}

p { position: relative; z-index: 3; }
</style>
</head>
<body>

<div class="carta-page">
  <div class="marca-deco">✦</div>
  <div class="flecha-navegacion"></div>
  <p>Nota urgente:</p>
  <p>Ahora sabéis lo que Rodrigo ocultó. Pero Miguel tiene su propio camino, y yo lo preparé. Hay un mensaje que dejé dividido en dos mitades — nadie puede leerlo entero solo. Subid al desván. Buscad donde guardé lo que no cupo en el salón. Cada mitad os dará la pieza que os falta.</p>
  <div class="sello-cera">E</div>
</div>

</body>
</html>
