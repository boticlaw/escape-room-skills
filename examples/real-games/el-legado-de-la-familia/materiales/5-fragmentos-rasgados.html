<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');
@page { size: A4 portrait; margin: 0; }
body { width: 186mm; height: 267mm; background: white; margin: 0; padding: 0; }
.page { width: 186mm; min-height: 267mm; padding: 10mm; display: flex; flex-wrap: wrap; gap: 5mm; align-content: flex-start; box-sizing: border-box; }
.fragmento {
  background: #f4e8c1; padding: 8mm;
  font-family: 'Caveat', cursive; font-size: 13pt; line-height: 1.5;
  color: #3d2b1f; display: flex; align-items: center; justify-content: center;
  text-align: center;
}
</style>
</head>
<body>

<div class="page">
  <div class="fragmento" style="width: 52mm; min-height: 40mm; clip-path: polygon(2% 0%, 98% 3%, 100% 95%, 3% 100%, 0% 40%); transform: rotate(-1.5deg);">'Buscad'</div>
  <div class="fragmento" style="width: 48mm; min-height: 38mm; clip-path: polygon(5% 2%, 97% 0%, 100% 90%, 4% 100%, 0% 50%); transform: rotate(1.2deg);">'bajo la'</div>
  <div class="fragmento" style="width: 55mm; min-height: 42mm; clip-path: polygon(0% 5%, 95% 0%, 100% 92%, 2% 100%, 5% 45%); transform: rotate(-0.8deg);">'tercera tabla'</div>
  <div class="fragmento" style="width: 50mm; min-height: 36mm; clip-path: polygon(3% 0%, 100% 4%, 97% 100%, 0% 95%, 2% 55%); transform: rotate(2.1deg);">'del suelo del'</div>
  <div class="fragmento" style="width: 46mm; min-height: 38mm; clip-path: polygon(0% 3%, 98% 0%, 100% 88%, 5% 100%, 3% 42%); transform: rotate(-2.3deg);">'desván, la'</div>
  <div class="fragmento" style="width: 54mm; min-height: 40mm; clip-path: polygon(4% 0%, 96% 2%, 100% 94%, 0% 98%, 1% 48%); transform: rotate(0.7deg);">'que tiene una marca'</div>
  <div class="fragmento" style="width: 48mm; min-height: 37mm; clip-path: polygon(1% 4%, 99% 0%, 97% 96%, 3% 100%, 0% 52%); transform: rotate(-1.8deg);">'de cera roja'</div>
  <div class="fragmento" style="width: 52mm; min-height: 35mm; clip-path: polygon(2% 0%, 100% 5%, 98% 92%, 0% 97%, 4% 44%); transform: rotate(1.5deg);">'en la esquina.'</div>
  <div class="fragmento" style="width: 50mm; min-height: 40mm; clip-path: polygon(0% 2%, 97% 0%, 100% 90%, 2% 100%, 5% 50%); transform: rotate(-0.5deg);">'Allí dejé'</div>
  <div class="fragmento" style="width: 55mm; min-height: 38mm; clip-path: polygon(3% 0%, 100% 3%, 95% 100%, 0% 95%, 0% 42%); transform: rotate(2.5deg);">'lo que Rodrigo quiso'</div>
  <div class="fragmento" style="width: 52mm; min-height: 36mm; clip-path: polygon(5% 2%, 95% 0%, 100% 94%, 2% 98%, 0% 48%); transform: rotate(-1.2deg);">'destruir pero yo'</div>
  <div class="fragmento" style="width: 58mm; min-height: 42mm; clip-path: polygon(0% 0%, 98% 4%, 100% 92%, 4% 100%, 2% 45%); transform: rotate(0.9deg);">'lo guardé para vosotros.'</div>
</div>

</body>
</html>
